# GitLab CI Example for Molca Build System
# Place this file as .gitlab-ci.yml in your repository root

variables:
  UNITY_VERSION: "2022.3.x"
  BUILD_PATH: "$CI_PROJECT_DIR/Builds"

stages:
  - build
  - deploy

# Template for Unity build jobs
.unity_build_template: &unity_build
  image: unityci/editor:$UNITY_VERSION
  before_script:
    - chmod +x ci/setup_unity.sh
    - apt-get update && apt-get install -y zip
  cache:
    key: "$CI_COMMIT_REF_SLUG-$CI_JOB_NAME"
    paths:
      - Library/
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    paths:
      - Builds/
    expire_in: 1 week

# Development builds (on develop branch)
build:development:windows:
  <<: *unity_build
  stage: build
  only:
    - develop
  script:
    - |
      xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
      unity-editor \
        -quit \
        -batchmode \
        -nographics \
        -silent-crashes \
        -projectPath . \
        -buildTarget Win64 \
        -executeMethod Molca.Editor.CommandLineBuild.BuildDevelopment \
        -logFile /dev/stdout
    - ls -la Builds/

build:development:android:
  <<: *unity_build
  stage: build
  only:
    - develop
  script:
    - |
      xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
      unity-editor \
        -quit \
        -batchmode \
        -nographics \
        -silent-crashes \
        -projectPath . \
        -buildTarget Android \
        -executeMethod Molca.Editor.CommandLineBuild.BuildDevelopment \
        -logFile /dev/stdout
    - ls -la Builds/Android/

# Staging builds (on staging branch or tag)
build:staging:windows:
  <<: *unity_build
  stage: build
  only:
    - staging
    - /^staging-.*$/
  script:
    - |
      xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
      unity-editor \
        -quit \
        -batchmode \
        -nographics \
        -silent-crashes \
        -projectPath . \
        -buildTarget Win64 \
        -executeMethod Molca.Editor.CommandLineBuild.BuildStaging \
        -logFile /dev/stdout

# Production builds (on main branch or version tags)
build:production:windows:
  <<: *unity_build
  stage: build
  only:
    - main
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  script:
    - |
      xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
      unity-editor \
        -quit \
        -batchmode \
        -nographics \
        -silent-crashes \
        -projectPath . \
        -buildTarget Win64 \
        -executeMethod Molca.Editor.CommandLineBuild.BuildProduction \
        -logFile /dev/stdout

build:production:android:
  <<: *unity_build
  stage: build
  only:
    - main
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  script:
    - |
      xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
      unity-editor \
        -quit \
        -batchmode \
        -nographics \
        -silent-crashes \
        -projectPath . \
        -buildTarget Android \
        -executeMethod Molca.Editor.CommandLineBuild.BuildProduction \
        -logFile /dev/stdout

# Deploy to itch.io (production only)
deploy:itchio:
  stage: deploy
  image: alpine:latest
  only:
    - main
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  dependencies:
    - build:production:windows
  before_script:
    - apk add --no-cache curl unzip
    - curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
    - unzip butler.zip
    - chmod +x butler
  script:
    - ./butler push Builds/Windows/ $ITCHIO_USER/$ITCHIO_GAME:windows --userversion $CI_COMMIT_TAG
  variables:
    ITCHIO_USER: "your-username"
    ITCHIO_GAME: "your-game"
  when: manual

# Deploy to internal server
deploy:internal:
  stage: deploy
  image: alpine:latest
  only:
    - staging
    - main
  dependencies:
    - build:staging:windows
  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $DEPLOY_SERVER >> ~/.ssh/known_hosts
  script:
    - rsync -avz --delete Builds/ $DEPLOY_USER@$DEPLOY_SERVER:$DEPLOY_PATH/
  variables:
    DEPLOY_SERVER: "your-server.com"
    DEPLOY_USER: "deploy"
    DEPLOY_PATH: "/var/www/builds"
  when: manual

# Setup Instructions:
# 
# 1. Create .gitlab-ci.yml in repository root
# 2. Set up GitLab CI/CD variables (Settings > CI/CD > Variables):
#    - UNITY_LICENSE (Unity activation file content)
#    - UNITY_EMAIL
#    - UNITY_PASSWORD
#    - SSH_PRIVATE_KEY (for deployment)
#    - BUTLER_API_KEY (for itch.io deployment)
# 
# 3. Update variables section with your Unity version
# 
# 4. Commit and push to trigger pipeline
# 
# 5. View pipeline progress in GitLab CI/CD > Pipelines

